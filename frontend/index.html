<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card" id="loginCard">
            <!-- Glow reflection overlay -->
            <div class="card-glow-overlay" id="glowOverlay"></div>
            
            <h1 class="main-title">AI Resume Analyzer</h1>

            <div class="form-container">
                <form id="loginForm" onsubmit="event.preventDefault(); submitAuthForm();">
                    <div class="input-group">
                        <label for="username">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2BE25F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            Username
                        </label>
                        <input type="text" id="username" placeholder="Enter your username" required autocomplete="off">
                    </div>

                    <div class="input-group">
                        <label for="password">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2BE25F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            Password
                        </label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Enter your password" required>
                            <button type="button" class="eye-btn" id="togglePassword">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="primary-btn" id="submitBtn">Log In</button>
                </form>
            </div>

            <div class="divider">
                <span>OR</span>
            </div>

            <button type="button" id="googleLoginBtn" class="primary-btn google-btn">
                <span class="google-icon">
                    <svg width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.69 1.22 9.18 3.61l6.84-6.84C35.68 2.3 30.2 0 24 0 14.64 0 6.56 5.48 2.56 13.44l7.98 6.2C12.44 13.12 17.78 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.5 24.5c0-1.63-.14-3.2-.4-4.71H24v9.01h12.66c-.55 2.96-2.2 5.46-4.68 7.15l7.26 5.64C43.96 37.16 46.5 31.38 46.5 24.5z"/>
                        <path fill="#FBBC05" d="M10.54 28.14a14.54 14.54 0 010-8.28l-7.98-6.2A23.96 23.96 0 000 24c0 3.86.92 7.51 2.56 10.34l7.98-6.2z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.92-2.13 15.9-5.8l-7.26-5.64c-2.02 1.36-4.6 2.17-8.64 2.17-6.22 0-11.56-3.62-13.46-8.64l-7.98 6.2C6.56 42.52 14.64 48 24 48z"/>
                    </svg>
                </span>
                Sign in with Google
            </button>

            <div class="toggle-text" id="toggleText">
                <span class="dot">••</span> Don't have an account? <span class="dot">••</span>
            </div>

            <button type="button" class="secondary-btn" id="toggleBtn" onclick="toggleAuthMode()">Create account</button>
        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
